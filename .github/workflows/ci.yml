name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: ML_Ops_assignment

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ML_Ops_assignment/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/ main.py

      - name: Regenerate train/test splits
        run: python -m src.data.prepare

      - name: Train model artifact (so test_model.py has a fresh pickle)
        run: python -m src.training.train

      - name: Run pytest
        run: python -m pytest tests/ --tb=short

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-model-py${{ matrix.python-version }}
          path: |
            ML_Ops_assignment/models/heart_model.pkl
            ML_Ops_assignment/reports/metrics.json
            ML_Ops_assignment/reports/figures/
          if-no-files-found: warn
          retention-days: 14

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: ML_Ops_assignment/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate model artifact for image
        run: |
          python -m src.data.prepare
          python -m src.training.train

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ML_Ops_assignment
          file: ML_Ops_assignment/Dockerfile
          push: false
          load: true
          tags: heart-disease-api:ci-${{ github.sha }}

      - name: Smoke-test the image
        run: |
          docker run -d --name svc -p 8080:8080 heart-disease-api:ci-${{ github.sha }}
          for i in 1 2 3 4 5; do
            sleep 2
            if curl -fs http://127.0.0.1:8080/health >/dev/null; then
              echo "service is healthy"
              break
            fi
          done
          curl -fs http://127.0.0.1:8080/health
          curl -fs -X POST http://127.0.0.1:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"age":67,"sex":1,"cp":4,"trestbps":160,"chol":286,"fbs":0,
                 "restecg":2,"thalach":108,"exang":1,"oldpeak":1.5,"slope":2,
                 "ca":3,"thal":7}'
          docker rm -f svc
