# Lean Grafana values for local Docker Desktop Kubernetes.
# Pre-wires the in-cluster Prometheus as the default datasource and
# auto-loads a dashboard for the heart-disease-api service.

adminUser: admin
adminPassword: admin

persistence:
  enabled: false

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'heart-disease'
        orgId: 1
        folder: 'Heart Disease'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/heart-disease

dashboardsConfigMaps:
  heart-disease: heart-disease-grafana-dashboard
