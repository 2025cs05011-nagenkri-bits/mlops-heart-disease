replicaCount: 2

image:
  repository: heart-disease-api
  tag: v2
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080

env:
  PORT: "8080"
  MODEL_PATH: "models/heart_model.pkl"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

ingress:
  enabled: false
  className: nginx
  host: heart-disease.local
  path: /
  pathType: Prefix

metrics:
  enabled: true
  path: /metrics
